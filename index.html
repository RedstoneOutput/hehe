<!DOCTYPE html>
<html>
<head>
    <title>C2 Command Center</title>
    <style>
        body { background: #0a0a0a; color: #00ff41; font-family: 'Courier New', monospace; padding: 20px; }
        .dashboard { border: 2px solid #00ff41; padding: 20px; background: #000; max-width: 800px; margin: auto; }
        .header { border-bottom: 1px solid #00ff41; padding-bottom: 10px; margin-bottom: 20px; }
        .log-window { background: #050505; border: 1px solid #333; height: 300px; overflow-y: scroll; padding: 10px; font-size: 13px; }
        .status-on { color: #00ff41; font-weight: bold; }
        .cmd-hint { color: #888; margin-top: 10px; }
        /* New styles for the navigation button */
        .nav-section { margin-bottom: 15px; padding: 10px; border: 1px dashed #444; }
        .launch-btn { background: #00ff41; color: #000; border: none; padding: 10px 15px; font-weight: bold; cursor: pointer; text-decoration: none; display: inline-block; }
        .launch-btn:hover { background: #00cc33; }
    </style>
</head>
<body>
    <div class="dashboard">
        <div class="header">
            <h2>EXTERNAL ASSET MONITOR [v1.0]</h2>
            <p>LISTENING ON: <span class="status-on">0.0.0.0:4444</span></p>
        </div>

        <div class="nav-section">
            <p style="margin-top: 0;">ASSET DEPLOYMENT:</p>
            <a href="prey_site.html" target="_blank" class="launch-btn">OPEN PREY SITE</a>
        </div>

        <div class="log-window" id="console">
            [SYSTEM] Starting listener...<br>
            [SYSTEM] Awaiting beacon from 192.168.40.136...<br>
        </div>

        <div class="cmd-hint">
            <p><strong>Note:</strong> Use the Python terminal (server.py) to send real-time commands once the connection is established.</p>
        </div>
    </div>

    <script>
        // Visual simulation for the dashboard UI
        const consoleLog = document.getElementById('console');
        setInterval(() => {
            const time = new Date().toLocaleTimeString();
            consoleLog.innerHTML += `<span style="color:#555">[${time}] Listener heartbeat... ok</span><br>`;
            consoleLog.scrollTop = consoleLog.scrollHeight;
        }, 5000);
    </script>
</body>
</html>
